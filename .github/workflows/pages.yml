name: Deploy static site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Note bootstrap requirements
        if: ${{ secrets.PAGES_DEPLOY_TOKEN == '' }}
        run: echo "::notice::Using GITHUB_TOKEN for Pages deploy. If this repository has never had Pages enabled, first set Settings > Pages > Source to GitHub Actions or add a PAGES_DEPLOY_TOKEN secret so the workflow can enable Pages automatically."

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_DEPLOY_TOKEN != '' && secrets.PAGES_DEPLOY_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_DEPLOY_TOKEN != '' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
